<div>
    <h2>Deposit</h2>
    <p>Here you can deposit funds into your account.</p>
    <form (ngSubmit)="onDeposit()">
        <label for="amount">Amount: </label>
        <input type="number" id="amount" name="amount" [(ngModel)]="depositAmount" required min="5">
        <p>Deposit will be recorded in account currency.</p>
        <button type="submit">Deposit</button>
    </form>
</div>
