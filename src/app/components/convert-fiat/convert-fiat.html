<div>
    <h2>Convert Fiat</h2>
    <p>Convert fiat currency to cryptocurrency.</p>
    <form (ngSubmit)="onConvert()">
        <label for="fromFiat">From:</label>
        <select id="fromFiat" name="fromFiat" [(ngModel)]="fromCurrency" required>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
        </select>

        <label for="toCrypto">To:</label>
        <select id="toCrypto" name="toCrypto" [(ngModel)]="toCurrency" required>
            <option value="BTC">Bitcoin (BTC)</option>
            <option value="ETH">Ethereum (ETH)</option>
            <option value="ADA">Cardano (ADA)</option>
            <option value="SOL">Solana (SOL)</option>
        </select>

        <label for="amount">Amount:</label>
        <input type="number" id="amount" name="amount" [(ngModel)]="fiatAmount" required min="1" step="0.01">

        <button type="submit">Convert</button>
    </form>
</div>
